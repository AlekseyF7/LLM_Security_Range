[pytest]
# auto = decorate any `async def` test automatically with @pytest.mark.asyncio.
# Удобно для тестов MCP client / async tools (Phase 2 плана).
asyncio_mode = auto
testpaths = tests
addopts = -ra --tb=short

# Cache в /tmp потому что /app в контейнере смонтирован read-only
# (bind mount tests/ + pytest.ini) и /app/.pytest_cache даёт PermissionError.
cache_dir = /tmp/pytest_cache
